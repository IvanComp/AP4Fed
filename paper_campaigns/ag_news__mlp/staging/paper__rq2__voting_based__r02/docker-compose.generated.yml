services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: flwr_server
    ports:
    - 8080:8080
    volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./performance:/app/performance
    - ./configuration:/app/configuration
    - ./model_weights:/app/model_weights
    - .:/app
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST_IP: host.docker.internal
      NUM_ROUNDS: '10'
      AGENT_LOG_TO_FILE: '0'
      AGENT_LOG_FILE: /dev/null
    networks:
    - flwr_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
    image: ap4fed_server:latest
    extra_hosts:
    - host.docker.internal:host-gateway
  client1:
    image: ap4fed_client:latest
    build:
      context: .
      dockerfile: Dockerfile.client
    labels:
    - type=client
    depends_on:
    - server
    networks:
    - flwr_network
    volumes:
    - ./data:/app/data
    - ./performance:/app/performance
    - ./configuration:/app/configuration
    - ./model_weights:/app/model_weights
    environment:
      NUM_ROUNDS: '10'
      NUM_CPUS: '5'
      NUM_RAM: 2g
      SERVER_ADDRESS: server:8080
      CLIENT_ID: '1'
      AGENT_LOG_TO_FILE: '0'
      AGENT_LOG_FILE: /dev/null
    command: sh -c "sleep 5 && python client.py"
    container_name: Client1
    cpus: 5.0
    mem_limit: 2g
    extra_hosts:
    - host.docker.internal:host-gateway
  client2:
    image: ap4fed_client:latest
